  role: "Player Character (new player)"

identity:
  legal_name: "Liang Mei-Yan"
  known_as: "“Essie” (the mission-school ‘Esther,’ to old friends and family)"
  stage_name: "Monsieur Mercure"
  billing: "\"The Quicksilver Conjurer — Master of the Impossible\""
  sex: "Female (performs and books as a man)"
  age: 38
  born: 1883
  occupation: "Stage Magician (Conjurer / Illusionist)"
  residence: "Boston, Massachusetts (rented rooms; lives largely out of a steamer trunk)"
