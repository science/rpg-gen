# entities.yaml — machine-readable entity index for the "Deserts of Ajiibwan" D&D 5e campaign.
#
# GENERATED from the synthesized compendium markdown in world/*.md
#   (gazetteer.md, cast.md, factions.md, artifacts.md, bestiary.md,
#    lore-and-mysteries.md, adventures.md).
#
# This is an INDEX only. It is intentionally terse: one-line summaries plus
# cross-links by id. The compendium markdown holds the full prose detail —
# consult the `sources` and the matching world/*.md section for everything else.
#
# id type-prefixes used:
#   region:    a named region / polity / large hub area
#   loc:       a sited settlement, ruin, dungeon, or major site
#   subloc:    a notable sublocation within a location (district, chamber, sub-site)
#   npc:       a non-player character (ally, neutral, functionary)
#   pc:        a prior-campaign player character (or permanent companion)
#   faction:   an organized power, cult, guild, merchant house, or local body
#   people:    a culture / people / ancient civilization
#   artifact:  a major / named / plot-relevant artifact or item
#   item:      a notable named non-plot magic item
#   creature:  a named or notable boss/regional creature
#   deity:     a god, fey power, or divine/spirit being
#   mystery:   an open mystery / unresolved central question
#   thread:    a smaller dangling live thread
#   adventure: a written (homebrew) adventure
#
# Slugs are lowercase ASCII with apostrophes stripped (B'rath -> brath,
# Farrav'n -> farravn). `name` preserves the exact display spelling.

